version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    depends_on:
      - auth-db
    environment:
      APP_PORT: 8081

      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: auth_db
      DB_SSLMODE: disable

      JWT_SECRET: mysecret
    ports:
      - "8081:8081"

  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  orders-service:
    build:
      context: ./orders-service
    container_name: orders-service
    depends_on:
      - orders-db
      - kafka
    environment:
      APP_PORT: 8082
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092

      DB_HOST: orders-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: orders_db
      DB_SSLMODE: disable

      JWT_SECRET: mysecret
    ports:
      - "8082:8082"

  orders-db:
    image: postgres:15-alpine
    container_name: orders-db
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - orders_db_data:/var/lib/postgresql/data

  payment-service:
    build:
      context: ./payments-service
    container_name: payment-service
    depends_on:
      - kafka
      - payment-db
    environment:
      APP_PORT: 8083
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092

      DB_HOST: payment-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: payment_db
      DB_SSLMODE: disable

      JWT_SECRET: mysecret
    ports:
      - "8083:8083"

  payment-db:
    image: postgres:15-alpine
    container_name: payment-db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data

  delivery-service:
    build:
      context: ./delivery-service
    container_name: delivery-service
    depends_on:
      - kafka
      - delivery-db
    environment:
      APP_PORT: 8084
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092

      DB_HOST: delivery-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: delivery_db
      DB_SSLMODE: disable

      JWT_SECRET: mysecret
    ports:
      - "8084:8084"

  delivery-db:
    image: postgres:15-alpine
    container_name: delivery-db
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - delivery_db_data:/var/lib/postgresql/data

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    depends_on:
      - kafka
    environment:
      APP_PORT: 8085
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
    ports:
      - "8085:8085"

volumes:
  auth_db_data:
  delivery_db_data:
  orders_db_data:
  payment_db_data: